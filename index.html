<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies website</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <nav>
      <div class="nav-wrapper">
        <div class="left-nav">
          <img src="assets/logo.png" alt="logo" />
          <h4>Kasi Cinema</h4>
        </div>
        <div class="right-nav">
          <p>No login required.</p>
        </div>
      </div>
    </nav>

    <!--Hero Section-->
    <section id="hero-section" class="hero-wrapper">
      <div class="hero-section">
        <div class="hero-image">
          <img src="assets/background-image.avif" alt="Background image" />
        </div>

        <div class="hero-heading">
          <h1>
            Free Movies Listings. <span class="orange-text">Discover</span> What
            to Watch, Anytime, Anywhere.
          </h1>
          <br />
          <br />

          <p>
            The search is over - find the perfect movie to watch tonight for
            free,<br />
            made easy for viewers in Mzansi.
          </p>
          <br />
          <br />
          <br />
          <a href="#browse-movies-header" class="btn-watch" id="btn-watch"
            >Watch free</a
          >
        </div>
      </div>
    </section>

    <section id="browse-movies-header">
      <div class="browse-movies-header">
        <div class="left-header"><h3>Browse your favourite movies!</h3></div>
        <div class="right-header">
          <img src="assets/search-icon.png" alt="Search icon" />
          <form action="">
            <input
              type="text"
              placeholder="Search movies..."
              id="search-query"
            />
          </form>
        </div>
      </div>
    </section>
    <section id="movies-grid">
      <div class="movies-wrapper" id="movies-wrapper"></div>
    </section>
    <script src="js/main.js"></script>
  </body>
</html>
